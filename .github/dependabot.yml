---
version: 2

updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: bun
    directory: /packages/homebrew-publish-formula
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      homebrew-publish-formula:
        patterns:
          - "*"

  - package-ecosystem: bun
    directory: /packages/validate-skills
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      validate-skills:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
      include: scope
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
