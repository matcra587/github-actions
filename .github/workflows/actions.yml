---
name: actions

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow lint
    uses: ./.github/workflows/workflow-lint.yml
    permissions:
      contents: read
    with:
      actionlint-args: |-
        -color
      zizmor-advanced-security: false # GHAS / code scanning unavailable on this private repo.
      zizmor-inputs: ./.github/
      zizmor-persona: pedantic
      zizmor-version: "1.24.1"
