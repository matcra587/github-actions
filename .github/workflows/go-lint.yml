---
name: go-lint

on:
  workflow_call:
    inputs:
      go-version:
        description: Go toolchain version.
        type: string
        default: "1.26"
      timeout:
        description: golangci-lint timeout (e.g. 5m).
        type: string
        default: "5m"

permissions: {}

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Download deps
        run: go mod download

      - name: Run golangci-lint
        run: go tool golangci-lint run --timeout="${TIMEOUT}"
        shell: bash
        env:
          TIMEOUT: ${{ inputs.timeout }}
