name: Validate Skills
description: Validate Claude Code skills, agents, commands, and marketplace.json against frontmatter rules, agentskills.io spec, and marketplace catalogue consistency.

inputs:
  path:
    description: Root directory to scan.
    required: false
    default: .
  validators:
    description: Comma-separated subset of validators to run. Use `all` (default) for the full pipeline, or any of `frontmatter`, `agentskills`, `marketplace` (singly or comma-separated) to scope the run — useful when calling the action as multiple named steps.
    required: false
    default: all

outputs:
  error-count:
    description: Total errors found.
  warning-count:
    description: Total warnings found.

runs:
  using: node24
  main: dist/index.js

branding:
  icon: check-circle
  color: green
